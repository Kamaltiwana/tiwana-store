<!DOCTYPE html>
<html>
<head>
  <title>Cart - Tiwane</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">TIWANA</div>
</header>

<section class="featured">
  <h2>Your Cart</h2>
  <div id="cartItems"></div>
  <h3 id="total"></h3>

  <a href="YOUR_GOOGLE_FORM_LINK" target="_blank" class="btn">
    PLACE COD ORDER
  </a>
</section>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = 0;
let output = "";

cart.forEach(item => {
  total += item.price;
  output += `<p>${item.name} (${item.size}) - ₹${item.price}</p>`;
});

document.getElementById("cartItems").innerHTML = output;
document.getElementById("total").innerHTML = "Total: ₹" + total;
</script>

</body>
</html>
