<!DOCTYPE html>
<html>
<head>
  <title>Shop - Tiwane</title>

</head>
<body>

  <nav>

</header>

<section class="featured">

  <div class="grid">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab" />

      <p>₹999</p>
      <select id="size1">
        <option>S</option>
        <option>M</option>
        <option>L</option>
        <option>XL</option>
      </select>
      <button onclick="addToCart('Black Tee', 999, document.getElementById('size1').value)">Add to Cart</button>
    </div>

  </div>

</section>

<script src="script.js"></script>
</body>
</html>
